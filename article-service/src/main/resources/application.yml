server:
  port: 8082

spring:
  application:
    name: article-service

  # 使用 H2 内存数据库（无需密码）
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:ai_knowledgehub;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true


mybatis-plus:

  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    ddl-auto: create

logging:
  level:
    com.ai.knowledgehub.article: debug