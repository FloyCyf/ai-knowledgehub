openapi: 3.0.3
info:
  title: AI-KnowledgeHub API
  version: 0.1.0
  description: 基于 AI 的智能知识库与内容发布平台接口草案。
servers:
  - url: http://localhost:8080
    description: Gateway local
security:
  - bearerAuth: []
paths:
  /api/user/register:
    post:
      tags: [User]
      summary: 用户注册
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /api/user/login:
    post:
      tags: [User]
      summary: 用户登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: success
  /api/user/logout:
    post:
      tags: [User]
      summary: 注销登录
      responses:
        "200":
          description: success
  /api/user/profile:
    get:
      tags: [User]
      summary: 获取当前用户信息
      responses:
        "200":
          description: success
  /api/articles/draft:
    post:
      tags: [Article]
      summary: 创建文章草稿
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticleDraftRequest"
      responses:
        "200":
          description: success
  /api/articles/latest:
    get:
      tags: [Article]
      summary: 分页获取最新文章
      security: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: success
  /api/articles/{id}:
    get:
      tags: [Article]
      summary: 获取文章详情
      security: []
      parameters:
        - $ref: "#/components/parameters/ArticleId"
      responses:
        "200":
          description: success
    put:
      tags: [Article]
      summary: 修改文章
      parameters:
        - $ref: "#/components/parameters/ArticleId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticleDraftRequest"
      responses:
        "200":
          description: success
    delete:
      tags: [Article]
      summary: 逻辑删除文章
      parameters:
        - $ref: "#/components/parameters/ArticleId"
      responses:
        "200":
          description: success
  /api/articles/{id}/publish:
    post:
      tags: [Article]
      summary: 发布文章并发送 MQ 事件
      parameters:
        - $ref: "#/components/parameters/ArticleId"
      responses:
        "200":
          description: success
  /api/articles/{id}/like:
    post:
      tags: [Article]
      summary: 点赞文章
      parameters:
        - $ref: "#/components/parameters/ArticleId"
      responses:
        "200":
          description: success
        "409":
          description: duplicate like
  /api/articles/{id}/comments:
    post:
      tags: [Article]
      summary: 评论文章
      parameters:
        - $ref: "#/components/parameters/ArticleId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentRequest"
      responses:
        "200":
          description: success
    get:
      tags: [Article]
      summary: 查看评论列表
      security: []
      parameters:
        - $ref: "#/components/parameters/ArticleId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: success
  /api/ranking/articles/{id}/view:
    post:
      tags: [Ranking]
      summary: 记录文章阅读热度
      security: []
      parameters:
        - $ref: "#/components/parameters/ArticleId"
      responses:
        "200":
          description: success
  /api/ranking/articles/{id}/like:
    post:
      tags: [Ranking]
      summary: 记录文章点赞热度
      parameters:
        - $ref: "#/components/parameters/ArticleId"
      responses:
        "200":
          description: success
  /api/ranking/top10:
    get:
      tags: [Ranking]
      summary: 获取全站 Top10 热榜
      security: []
      responses:
        "200":
          description: success
  /api/ai/continue-writing:
    post:
      tags: [AI]
      summary: AI 续写
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContinueWritingRequest"
      responses:
        "200":
          description: success
  /api/ai/continue-writing/stream:
    get:
      tags: [AI]
      summary: AI SSE 流式续写
      parameters:
        - name: prompt
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: text/event-stream
          content:
            text/event-stream:
              schema:
                type: string
  /api/ai/articles/{id}/analysis:
    get:
      tags: [AI]
      summary: 获取文章 AI 分析结果
      parameters:
        - $ref: "#/components/parameters/ArticleId"
      responses:
        "200":
          description: success
  /api/admin/rate-limit/article-detail:
    put:
      tags: [Admin]
      summary: 修改文章详情动态限流配置
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RateLimitRuleRequest"
      responses:
        "200":
          description: success
        "403":
          description: forbidden
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ArticleId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 1
    Size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        default: 10
  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          type: object
    RegisterRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
    ArticleDraftRequest:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
        content:
          type: string
        summary:
          type: string
    CommentRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
    ContinueWritingRequest:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
    RateLimitRuleRequest:
      type: object
      required: [windowSeconds, maxRequests, enabled]
      properties:
        windowSeconds:
          type: integer
          example: 10
        maxRequests:
          type: integer
          example: 20
        enabled:
          type: boolean
          example: true

