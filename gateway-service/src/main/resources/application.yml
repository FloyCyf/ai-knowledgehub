server:
  port: 8080

spring:
  application:
    name: gateway-service
  config:
    import: optional:nacos:gateway-service.yml

  # H2 数据库配置（用于启动）
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:gateway;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false

  cloud:
    nacos:
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        group: ${NACOS_CONFIG_GROUP:DEFAULT_GROUP}
        namespace: ${NACOS_NAMESPACE:}
        file-extension: yml
        refresh-enabled: true
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/user/**

        - id: article-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/articles/**

        - id: ranking-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/ranking/**

        - id: ai-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/ai/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

jwt:
  secret: ${JWT_SECRET:ai-knowledgehub-default-secret-key-for-jwt-token-generation-2024-do-not-use-in-prod}
  expiration: 86400000  # 24 hours

rate-limit:
  enabled: true
  article-detail:
    window-seconds: 10
    max-requests: 20
