server:
  port: 8080

spring:
  application:
    name: gateway-service

  # H2 数据库配置（用于启动）
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:gateway;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/user/**

        - id: article-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/articles/**

        - id: ranking-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/ranking/**

        - id: ai-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/ai/**

        # ============== 管理员接口路由到 user-service ==============
        - id: admin-routes
          uri: http://localhost:8081
          predicates:
            - Path=/api/admin/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

jwt:
  secret: AIKnowledgeHubSecretKey2026VeryLongSecretKeyForJWTSigning
  expiration: 86400000  # 24 hours

rate-limit:
  enabled: true
  article-detail:
    window-seconds: 10
    max-requests: 20

# Redis 仅用于 Token 黑名单；限流配置本地演示使用网关内存窗口
spring.data.redis:
  repositories:
    enabled: false
