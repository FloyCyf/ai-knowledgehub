server:
  port: 8084

spring:
  application:
    name: ai-service

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_knowledgehub?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123456

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: manual
        concurrency: 2
        max-concurrency: 10
        prefetch: 5

ai:
  mock:
    enabled: false
    model-name: GPT-4
    streaming-delay-ms: 50
    timeout-ms: 60000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com.ai.knowledgehub.ai: info
    org.springframework.amqp: debug
