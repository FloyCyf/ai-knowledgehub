spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:akh_user_test;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
  h2:
    console:
      enabled: false
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: test-secret-key-must-be-at-least-32-bytes-long-for-jwt-hs256-signing
  expiration-millis: 86400000
  issuer: ai-knowledgehub-test

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
